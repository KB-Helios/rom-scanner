name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,tray]"

      - name: Ruff
        run: python -m ruff check rom_scanner.py scanner parsers tray tests

      - name: Pyrefly
        run: python -m pyrefly check rom_scanner.py scanner parsers tray tests --output-format=github

      - name: Pytest
        run: python -m pytest tests/ -v
