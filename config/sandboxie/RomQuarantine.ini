#
# Sandboxie-Plus box template for ROM download quarantine.
# Copy to Sandboxie-Plus user INI directory or import via Sandboxie UI.
#
# Adjust FileRootPath to match your ROM_SCANNER_HOME/sbx layout.
#

[GlobalSettings]
FileRootPath=C:\RomScanner\sbx\%SANDBOX%

[RomQuarantine]
Enabled=y
ConfigLevel=9
AutoRecover=y
BlockNetworkFiles=y
BlockNetParam=y

# Force Chrome into this box
ForceProcess=chrome.exe

# Allow writes only to Downloads inside the sandbox
OpenFilePath=%Downloads%\
WriteFilePath=%Downloads%\

# Block writes to personal folders
ClosedFilePath=%Desktop%
ClosedFilePath=%Personal%
ClosedFilePath=%Favorites%
ClosedFilePath=%My Pictures%
ClosedFilePath=%My Music%
ClosedFilePath=%My Video%

# Block execution from downloads (ROM files are data, not executed here)
ClosedIpcPath=\RPC Control\*

RecoverFolder=%Downloads%
RecoverFolder=%Desktop%

[UserSettings]
Downloads=C:\RomScanner\sbx\RomQuarantine\user\current\Downloads
